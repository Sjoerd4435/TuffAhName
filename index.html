<!DOCTYPE html>
<html>
<head>
    <title>Tuff Name Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Tuff Name Generator</h1>

<div class="generator">
    <div id="result">Click Generate</div>
    <div id="rarity"></div>
    <button onclick="generate()">Generate</button>
</div>

<div class="stats">
    <p>Coins: <span id="coins">0</span></p>
</div>

<div class="shop">
    <h2>Shop</h2>
    <button onclick="upgradeLuck()">
        Buy Luck Upgrade - <span id="luckPrice">50</span> coins
    </button>
    <button onclick="upgradeAuto()">
        Buy Auto Upgrade - <span id="autoPrice">100</span> coins
    </button>

    <h3>Enter Code</h3>
    <input id="codeBox" placeholder="Enter code">
    <button onclick="redeemCode()">Redeem</button>
</div>
<div id="luckDisplay">Luck: 0%</div>
<div id="inventory" style="margin-top:40px;"></div>
<div id="rarityOverlay"></div>
<div id="abyssalFlood"></div>
<script src="script.js"></script>
</body>
</html>
